<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dülïm IA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; font-family: Arial; display: flex; flex-direction: column; height: 100vh; }
        header { background: #16213e; padding: 15px; display: flex; align-items: center; gap: 15px; }
        .avatar { width: 50px; height: 50px; background: #e94560; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; }
        .info h2 { color: white; }
        .info p { color: #2ecc71; font-size: 12px; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-box { display: flex; flex-direction: column; max-width: 80%; }
        .msg-box.user { align-self: flex-end; align-items: flex-end; }
        .msg-box.bot { align-self: flex-start; align-items: flex-start; }
        .mensagem { padding: 12px 16px; border-radius: 15px; font-size: 16px; }
        .user .mensagem { background: #e94560; color: white; border-radius: 15px 15px 0 15px; }
        .bot .mensagem { background: #16213e; color: white; border-radius: 15px 15px 15px 0; }
        .hora { font-size: 11px; color: #666; margin-top: 3px; }
        .input-area { display: flex; padding: 15px; background: #16213e; gap: 10px; }
        input { flex: 1; padding: 15px; border-radius: 25px; border: none; background: #0f3460; color: white; font-size: 16px; }
        button { background: #e94560; color: white; border: none; padding: 15px 20px; border-radius: 25px; font-size: 16px; cursor: pointer; }
        .digitando { color: #aaa; font-size: 14px; padding: 5px 20px; }
    </style>
</head>
<body>
    <header>
        <div class="avatar">🤖</div>
        <div class="info">
            <h2>Dülïm IA</h2>
            <p>● Online</p>
        </div>
    </header>
    <div id="chat">
        <div class="msg-box bot">
            <div class="mensagem">Olá! Sou o Dülïm IA. Como posso ajudar?</div>
        </div>
    </div>
    <div class="digitando" id="digitando"></div>
    <div class="input-area">
        <input type="text" id="input" placeholder="Escreve uma mensagem..." onkeypress="if(event.key==='Enter') enviar()">
        <button onclick="enviar()">&#10148;</button>
    </div>
    <script>
        const KEY = "AIzaSyA052weJ2gYFEM1Rej_Xcy1zjXDZVHuNGQ";
        const URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + KEY;

        function hora() {
            return new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        async function enviar() {
            let input = document.getElementById("input");
            let msg = input.value.trim();
            if (!msg) return;
            let chat = document.getElementById("chat");
            chat.innerHTML += '<div class="msg-box user"><div class="mensagem">' + msg + '</div><div class="hora">' + hora() + '</div></div>';
            input.value = '';
            chat.scrollTop = chat.scrollHeight;
            document.getElementById("digitando").innerText = "Dülïm IA está a pensar...";
            try {
                const res = await fetch(URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: msg }] }] })
                });
                const data = await res.json();
                const resposta = data.candidates[0].content.parts[0].text;
                document.getElementById("digitando").innerText = "";
                chat.innerHTML += '<div class="msg-box bot"><div class="mensagem">' + resposta + '</div><div class="hora">' + hora() + '</div></div>';
                chat.scrollTop = chat.scrollHeight;
            } catch(e) {
                document.getElementById("digitando").innerText = "";
                chat.innerHTML += '<div class="msg-box bot"><div class="mensagem">Erro! Tenta novamente.</div></div>';
            }
        }
    </script>
</body>
  </html>
